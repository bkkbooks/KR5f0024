front:
  text: 天機經志九叙曰有機而无其人者敗有其人而无其道者敗故易曰即鹿无虞惟入子林中君子幾不如舍往吝故聖人觀其時而用其符應其機而制其事故能運生殺於掌内成功業於天下者也易曰君子藏器于身待時而動是以聖人保之於靈臺以觀機變卷之則自勝舒之則勝人察之則无形用之則不極易曰隂陽不測之謂神而隂符象之矣故聖人不測之符陶均天下而无所歸怨矣夫天爲地主道爲德君故聖人奉地而法天立德而行道舉天道而爲經首明地以奉之易曰乃順承天待時而動是故聖人將欲施爲必先觀天道之盈虚後執而行之舉事應機則無遺策易曰後天而奉天時
  hash: sha256:6d8de5b839a42cea119bd967cce6d8304ce1b5d729da5ef0daa60eef54936880
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0024_SJB_000-280347a, image: sjb/28/280347a.png}
body:
  text: 昌夫聖人法地而奉天立德而行道居天地道德之間建莫大之功者未有不因五賊而成也五賊者其一賊命其二賊物其三賊時其四賊功其五賊神皇帝王霸權變之道也是以聖人觀其機而應之度其時而用也故太公立霸典而滅殷朝行三風而理周室豈不隨時應機驅馳五賊者也故聖人立本於皇王之中應機於權霸之内經邦治身五賊者備矣則天下望風而從之竭其性命而无所歸其恩怨也乃謂之曰有道之盜无形之兵嗚呼寇莫大焉五賊在心擒縱在手治身佐世莫尚於斯經云見之者昌不亦宜乎身夫人心身之主魂之宫魄之府將欲施行五賊者莫尚乎心事有所圖必合天道此則宇宙雖廣覽之只在於掌中萬物雖多生殺不離於術内則明天地不足貴以遠以厚而況耳目之前乎機夫殺機者兩朝終始之萌萬人生死之兆處雲雷未泰之日玄黄流血之時故天之爲變也則龍出于田蛇游乎路此爲交戰之機故曰龍蛇起陸人之爲變也則春行秋令賞逆罰忠此爲顛墮之機故曰天地反覆天人之機同時而發雖千變萬化成敗之機定矣藏夫仁者必有勇勇者不必有仁智者能愚愚者不必能智故聖人時通則見其巧而建其功時否則見其拙而昧其跡故孔明序曰太公八十非不遇也蓋審其主焉嗚呼性命巧拙之時識達行藏之勢可以觀變察機運用五賊所以然者夫聖人所以深衷遠照動不失機觀天料人應時而作故易曰知進退存亡而不失其正者其惟聖人乎靜夫九竅者在天爲九星在地爲九州在人爲九竅九竅之炁不正故曰受邪受邪則識用偏識用偏則不可發機觀變故九竅之急在乎三要太公曰耳目口也夫耳目口者心之佐助也神之門户也智之樞機也人之禍福也故耳无聦不能别其音目无明不能見其機口无度不能施其令夫三要不精上不能治國下不能治家況兵者乎懸人之性命爲國之存亡靜動之間不得無事豈可輕而用之人夫火生於木火發而木焚國生於姦姦深則國亂亦猶蠶能作繭繭成則殺其身人能生事事煩則害其命非至聖不能修身鍊行防之於未萌治之於未亂夫十圍之木起於拱把百仞之臺起於足下治小惡不懼必成大禍嗚呼木不相摩火无由出國无亂政姦无由生有始有終是非不動能知之其惟聖人乎安萬物盜天地之精以生成人盜萬物之形以御用萬物盜人之力以種植彼此相盜各獲其宜俱不知爲萬物化故能用機者法此三事以道之盜而賊於物物亦知爲盜之道听以然者貴得其時也貴得其機也故曰合其時而食則百骸治應其機而動則萬化安乖時失機則禍亂生也神老君曰功成不有爲而不恃此全生立德之本也夫小人者貪其財則以身徇利愛其名則以力爭功矜衒神跡而求神名物共嫉之必喪其命欲益招損是不神矣夫君子建大功而不恃防小禍於未萌退己進人推能讓物物共戴之故不奪其利自發神智不能爭物物共讓之不居其後爲損招益是以至神矣故老君曰爲者敗之執者失之誠哉言也聖假如千年一聖五百年一賢應日月之數所生而大小之人定矣夫大人出世應明德而建聖功小人當時則廢正綱而生禍亂故太公說於西伯知人望而己歸周劉琨表於琅瑘識天時而未離晋陵母自死知明主之必興括母不誅見趙軍之必敗故天道人事賢者可以預知佐非其人夷於九族故易曰長子帥師開國承家小人勿用必亂邦也命夫成敗之道未形死生之機未發小人能見君子能知則易見而難知見近而知遠也夫見機者則趨時而就利皆不保其天年知機者則原始而要終固必全其性命倍瞽者善聽神不離於耳聾者善視心不離於目其爲聽也神則專耳其爲視也心則專目耳之與目遞爲用師當用之時利絶其一心之所主則无事不精猶有十倍之利何況反覆以此用之三思精誠一計順時隱顯應機行藏以此用師固萬倍之勝利物夫人之心无故不動生之與死縁物而然物動則心生物靜則心死生死之狀其惟物乎目目者神之門神者心之主神之出入莫不游乎目故見機者莫不尚乎目能知機者莫不尚乎心蠢然夫道不爲萬物而生春萬物感春炁而自生秋不爲萬物而殺萬物感秋炁而自殺其爲生也不恃其恩不求其報故其恩大矣其爲殺也不恃其威不求其懼其威大矣凡物取而得之者小不取而得之者大故聖人不取夫君王有道无道則人民治亂之機謌謡或樂或哀則時年豐儉之兆時人不能省察天地乃降徵祥或五雲騰起七曜變行皆因國風是以然矣且宋君失德熒惑守心及乎謝愆退之三舍用今儔古皎在目前以彼喻斯豈勞心術故智者悟於人事之初而愚者晦於星象之後矣生老君以无爲有母靜爲躁君夫靜者元炁未分之初形於元炁之中故能生天地萬物亦猶人弘靜其心不撓則能生天下萬物也勝勝浸長也天地之道各自浸長天則長陽也地則長隂也隂陽相招一晝一夜遞爲君臣更相制勝故曰隂陽相勝夫開國用師必侵天道亦猶金火相交而非交不伏也天且弗違而況於人乎順易曰剛柔相摩而生變化變化不慝故曰順也夫人之育身治性尚不可逆時爲之而況經邦佐世之雄哉契至聖之道窈然无爲无爲則无機无機則至靜夫律曆之妙動則能知體既虚無莫得施其管術亦猶兵者不失其機不露其釁雖有智士從何制焉象竒器者隂陽之故能生萬物亦猶人心能造萬事象矣進前象狀也八卦六甲鬼神機密之事剛柔相制之術昭昭乎前列其狀矣天機經終
  hash: sha256:16b579c8c6f9242cf38d47b424e6ee487bf65174cf450438f64202ca28f07c0a
